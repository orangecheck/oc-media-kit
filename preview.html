<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>oc-media-kit · contact sheet</title>
<link rel="icon" type="image/svg+xml" href="dist/orangecheck/favicon/favicon.svg">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-2: #141414;
    --fg: #fafafa;
    --muted: #737373;
    --orange: #f97316;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  html, body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--mono); }
  header { padding: 40px 48px 24px; border-bottom: 1px solid #1f1f1f; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  header h1 { margin: 0 0 6px; font-size: 18px; font-weight: 700; }
  header h1 span { color: var(--orange); }
  header p { margin: 0; color: var(--muted); font-size: 13px; }
  header nav { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; }
  header nav a { color: var(--muted); text-decoration: none; }
  header nav a:hover { color: var(--orange); }
  main { padding: 32px 48px 120px; display: grid; gap: 56px; max-width: 1280px; margin: 0 auto; }
  section { display: grid; gap: 16px; scroll-margin-top: 140px; }
  section h2 { margin: 0; font-size: 14px; color: var(--fg); font-weight: 700; letter-spacing: -0.01em; }
  section h2 .host { color: var(--muted); font-weight: 400; margin-left: 8px; font-size: 12px; }
  section .tagline { color: var(--muted); font-size: 12px; margin: -8px 0 8px; }
  .row { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
  figure { margin: 0; display: grid; gap: 8px; }
  figcaption { font-size: 10px; color: var(--muted); text-align: center; }
  figcaption b { color: var(--fg); font-weight: 700; display: block; }
  .tile { background: var(--bg-2); padding: 12px; border-radius: 10px; border: 1px solid #1f1f1f; display: inline-flex; }
  .tile.light { background: #fafafa; }
  .checker {
    background-image:
      linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
      linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
      linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    background-color: #0f0f0f;
  }
  .og { background: var(--bg-2); padding: 18px; border-radius: 10px; border: 1px solid #1f1f1f; max-width: 920px; }
  .og img { width: 100%; display: block; border-radius: 4px; }
  .swatches { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .swatch-color { width: 88px; height: 88px; border-radius: 8px; border: 1px solid #1f1f1f; }
  .swatch-label { font-size: 11px; color: var(--muted); }
  .swatch-label b { color: var(--fg); display: block; }
  code { color: var(--orange); background: #1a1a1a; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
  hr { border: none; border-top: 1px dashed #2a2a2a; margin: 0; }
  .row.gap-sm { gap: 10px; }
  .tile img { image-rendering: -webkit-optimize-contrast; }
  .brandhead { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid #1f1f1f; margin-bottom: 4px; }
  .brandhead img { width: 36px; height: 36px; }
  .brandhead .title { font-size: 16px; font-weight: 700; }
  .brandhead .host { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1><span>§</span>&nbsp;oc-media-kit — contact sheet</h1>
  <p>12 brands · ~150 svgs · ~1,266 pngs · supersampled with LANCZOS</p>
  <nav>
    <a href="#colors">colors</a>
    <a href="#orangecheck">orangecheck</a>
    <a href="#attest">attest</a>
    <a href="#docs">docs</a>
    <a href="#me">me</a>
    <a href="#vault">vault</a>
    <a href="#fleet">fleet</a>
    <a href="#lock">lock</a>
    <a href="#vote">vote</a>
    <a href="#stamp">stamp</a>
    <a href="#agent">agent</a>
    <a href="#pledge">pledge</a>
    <a href="#analytics">analytics</a>
  </nav>
</header>

<main>

<section id="colors">
  <h2>colors <span class="host">five tokens</span></h2>
  <div class="swatches">
    <div class="swatch"><div class="swatch-color" style="background:#f97316"></div><div class="swatch-label"><b>orange</b>#f97316</div></div>
    <div class="swatch"><div class="swatch-color" style="background:#ea580c"></div><div class="swatch-label"><b>orange-deep</b>#ea580c</div></div>
    <div class="swatch"><div class="swatch-color" style="background:#0a0a0a;border-color:#333"></div><div class="swatch-label"><b>dark</b>#0a0a0a</div></div>
    <div class="swatch"><div class="swatch-color" style="background:#fafafa"></div><div class="swatch-label"><b>light</b>#fafafa</div></div>
    <div class="swatch"><div class="swatch-color" style="background:#737373"></div><div class="swatch-label"><b>muted</b>#737373</div></div>
  </div>
</section>

<!-- The script below reads manifest.json and injects one <section>
     per brand showing every variant at multiple sizes. Static fallback
     for offline viewing comes next. -->

<div id="brands"></div>

<script>
(async () => {
  const manifest = await fetch('manifest.json').then(r => r.json()).catch(() => null);
  if (!manifest) return;

  // Variants to show in the contact sheet, in order. The grid only renders
  // a variant if the brand actually has it (glyph-only brands have more).
  const SQUARE_VARIANTS = [
    'square-on-dark', 'square-on-light',
    'rounded-on-dark', 'rounded-on-light',
    'safearea-on-dark', 'safearea-on-light',
    'circle-on-dark', 'circle-on-light',
    'square-white-on-orange', 'square-black-on-orange',
    'rounded-white-on-orange', 'rounded-black-on-orange',
    'circle-white-on-orange', 'circle-black-on-orange',
    'transparent', 'transparent-dark', 'transparent-light',
  ];
  const OG_VARIANTS = ['og-on-dark', 'og-on-light', 'og-white-on-orange'];

  const root = document.getElementById('brands');

  for (const brand of manifest.brands) {
    const section = document.createElement('section');
    section.id = brand.slug;

    const head = document.createElement('div');
    head.className = 'brandhead';
    const headImg = brand.variants['square-on-dark']?.png?.['128x128'];
    if (headImg) {
      const img = document.createElement('img');
      img.src = headImg;
      img.alt = brand.label;
      head.appendChild(img);
    }
    const heading = document.createElement('div');
    heading.innerHTML = `<div class="title">${brand.label}</div>` +
                       `<div class="host">${brand.hostname}</div>`;
    head.appendChild(heading);
    section.appendChild(head);

    if (brand.tagline) {
      const tg = document.createElement('div');
      tg.className = 'tagline';
      tg.textContent = brand.tagline;
      section.appendChild(tg);
    }

    // square variants — show all sizes for the canonical square-on-dark,
    // then a single 128 per remaining variant.
    {
      const h = document.createElement('h2');
      h.innerHTML = `canonical · size ladder <span class="host">all 10 sizes of square-on-dark</span>`;
      section.appendChild(h);
      const row = document.createElement('div');
      row.className = 'row gap-sm';
      const sizes = ['16x16','32x32','48x48','64x64','128x128','180x180','192x192','256x256'];
      const v = brand.variants['square-on-dark'];
      if (v) {
        for (const s of sizes) {
          if (!v.png[s]) continue;
          const sz = s.split('x')[0];
          const fig = document.createElement('figure');
          fig.innerHTML = `<div class="tile"><img src="${v.png[s]}" width="${sz}" height="${sz}"></div><figcaption>${s}</figcaption>`;
          row.appendChild(fig);
        }
      }
      section.appendChild(row);
    }

    // each available variant @ 128
    {
      const h = document.createElement('h2');
      h.innerHTML = `variants <span class="host">all shown at 128×128</span>`;
      section.appendChild(h);
      const row = document.createElement('div');
      row.className = 'row';
      for (const stem of SQUARE_VARIANTS) {
        const v = brand.variants[stem];
        if (!v) continue;
        const png = v.png['128x128'];
        if (!png) continue;
        const isTransparent = stem.startsWith('transparent');
        const isLight = stem.endsWith('on-light') || stem === 'transparent-dark';
        const tileClass = isTransparent ? 'tile checker' : (isLight ? 'tile light' : 'tile');
        const fig = document.createElement('figure');
        fig.innerHTML = `<div class="${tileClass}"><img src="${png}" width="128" height="128"></div><figcaption><b>${stem}</b></figcaption>`;
        row.appendChild(fig);
      }
      section.appendChild(row);
    }

    // og cards
    {
      const ogStems = OG_VARIANTS.filter(s => brand.variants[s]);
      if (ogStems.length) {
        const h = document.createElement('h2');
        h.innerHTML = `og share cards <span class="host">1200×630</span>`;
        section.appendChild(h);
        for (const stem of ogStems) {
          const v = brand.variants[stem];
          const png = v.png['1200x630'];
          const og = document.createElement('div');
          og.className = 'og';
          og.innerHTML = `<img src="${png}" alt="${stem}"><div class="tagline">${stem}</div>`;
          section.appendChild(og);
        }
      }
    }

    root.appendChild(section);
  }
})();
</script>

</main>
</body>
</html>
